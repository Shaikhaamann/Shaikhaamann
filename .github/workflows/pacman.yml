name: Generate Pacman Contribution

on:
  schedule:
  - cron: "0 0 * * *"
     workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v3

  - name: Generate Pacman Animation
    uses: Platane/snk@v3
    with:
      github_user_name: shaikhaamann
      outputs: |
        dist/pacman-contribution.svg

  - name: Push to branch
    uses: crazy-max/ghaction-github-pages@v3
    with:
      target_branch: output
      build_dir: dist

